<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holi 2026 | Immersive Festival</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #ff007f;
            --bg-image: radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(255, 211, 42, 0.1) 0%, transparent 50%),
                        #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-image);
            background-attachment: fixed;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
            transition: background 1s ease;
        }

        #gulaal-canvas {
            position: fixed;
            top: 0; left: 0; z-index: 1;
            pointer-events: none;
        }

        .stage {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            perspective: 1500px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            display: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.05);
            transform-style: preserve-3d;
        }

        .card.active {
            display: block;
            animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        h1 { 
            font-family: 'Caveat', cursive; 
            font-size: 4rem; 
            margin-bottom: 0.5rem; 
            color: var(--theme-color); 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        
        .poetry { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.3rem; 
            line-height: 1.8; 
            margin: 20px 0; 
            color: #ffffff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        .highlight { font-weight: 600; color: var(--theme-color); }

        input {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
            width: 100%;
            margin-bottom: 2rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--theme-color); background: rgba(255,255,255,0.15); }

        .btn {
            background: var(--theme-color);
            color: white;
            padding: 15px 45px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateZ(-150px) translateY(50px); }
            to { opacity: 1; transform: translateZ(0) translateY(0); }
        }

        .trapti-bg { --theme-color: #ff4757; }
        .priya-bg { --theme-color: #00d2ff; }
        .nimita-bg, .lovely-bg { --theme-color: #2ecc71; }
        .prince-bg { --theme-color: #f39c12; }
    </style>
</head>
<body onmousedown="spawnGulaal(event)">

<canvas id="gulaal-canvas"></canvas>

<div class="stage">
    <div id="page1" class="card active">
        <h1>Bura Na Mano...</h1>
        <p class="poetry">Colors have a way of speaking when words fall short. Enter your name to listen.</p>
        <input type="text" id="nameKey" placeholder="Who's there?">
        <button class="btn" onclick="unlock()">Unlock Holi</button>
    </div>

    <div id="page2" class="card">
        <h1 id="title-p2">Holi Wishes</h1>
        <div id="quote-p2" class="poetry"></div>
        <button class="btn" onclick="nextPage(3)">Next Color</button>
    </div>

    <div id="page3" class="card">
        <h1 id="title-p3">A Splash of Joy</h1>
        <div id="poetry-p3" class="poetry"></div>
        <p id="footer-p3" class="highlight" style="font-size: 0.9rem; letter-spacing: 2px;"></p>
        <br>
        <button class="btn" onclick="location.reload()">Start Over</button>
    </div>
</div>

<script>
    let currentName = "";
    const canvas = document.getElementById('gulaal-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];

    function unlock() {
        currentName = document.getElementById('nameKey').value.trim().toLowerCase();
        if (!currentName) return;
        setupContent();
        nextPage(2);
    }

    function setupContent() {
        const body = document.body;
        const p2T = document.getElementById('title-p2');
        const p2Q = document.getElementById('quote-p2');
        const p3T = document.getElementById('title-p3');
        const p3P = document.getElementById('poetry-p3');
        const p3F = document.getElementById('footer-p3');

        if (currentName === 'trapti') {
            body.className = 'trapti-bg';
            p2T.innerText = "For My Dearest";
            p2Q.innerHTML = "They say the best things in life aren't things. They are people who make your world feel like a constant festival. You are my constant festival, Trapti.";
            p3T.innerText = "Beyond Colors";
            p3P.innerHTML = "“May the colors of this day reflect the warmth you bring to my heart every single day. Happy Holi to the one who is my everything.”";
            p3F.innerText = "ALWAYS YOURS • 2026";
        } 
        else if (currentName === 'priya') {
            body.className = 'priya-bg';
            p2T.innerText = "Happy Holi, Priya!";
            p2Q.innerText = "Wishing my amazing cousin a day filled with the sweetest memories, loudest laughs, and a bucket full of joy!";
            p3T.innerText = "Pure Happiness";
            p3P.innerHTML = "“May your path always be as bright as the Holi sky and your heart as light as the spring breeze. Have a vibrant one!”";
            p3F.innerText = "STAY BRIGHT • STAY YOU";
        } 
        else if (currentName === 'prince') {
            body.className = 'prince-bg';
            p2T.innerText = "My Brother, Prince";
            p2Q.innerText = "Life is better with friends who feel like family. Wishing you a year as legendary as our friendship!";
            p3T.innerText = "True Friendship";
            p3P.innerHTML = "“May this Holi fill your life with success, energy, and countless moments of madness. Happy Holi, my best friend!”";
            p3F.innerText = "BROTHERS FOREVER • 2026";
        }
        else if (currentName === 'nimita' || currentName === 'lovely') {
            body.className = (currentName === 'nimita') ? 'nimita-bg' : 'lovely-bg';
            p2T.innerText = `Happy Holi, ${currentName.charAt(0).toUpperCase() + currentName.slice(1)}`;
            p2Q.innerText = "May the festival of colors paint your life with health, success, and the most beautiful smiles.";
            p3T.innerText = "Vibrant Life";
            p3P.innerHTML = `“May this celebration be a beautiful start to a year filled with wonderful surprises and endless prosperity. Happy Holi!”`;
            p3F.innerText = "CELEBRATE TO THE FULLEST";
        }
    }

    function nextPage(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('page' + n).classList.add('active');
        explode(window.innerWidth/2, window.innerHeight/2);
    }

    class Gulaal {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.color = color;
            this.size = Math.random() * 8 + 2;
            this.vx = (Math.random() - 0.5) * 16;
            this.vy = (Math.random() - 0.5) * 16;
            this.alpha = 1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vy += 0.2; 
            this.alpha -= 0.015;
            this.size *= 0.98;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function spawnGulaal(e) {
        const theme = getComputedStyle(document.body).getPropertyValue('--theme-color');
        const colors = [theme, '#ffd32a', '#ffffff', '#ff9f43', '#00d2ff'];
        for(let i=0; i<40; i++) {
            particles.push(new Gulaal(e.clientX, e.clientY, colors[Math.floor(Math.random()*colors.length)]));
        }
    }

    function explode(x, y) {
        const theme = getComputedStyle(document.body).getPropertyValue('--theme-color');
        for(let i=0; i<100; i++) {
            particles.push(new Gulaal(x, y, theme));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.alpha > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
</script>
</body>
</html>
